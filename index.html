 <title>Canvas</title>

<body>
  <canvas id="canvas" width="200" height="200"></canvas>
 <script>
 var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");
for (var i = 1; i < 20; i++) {
 ctx.fillRect(10, i * 10, 10, 10);
}
  for (var i = 1; i < 10; i++) {
 ctx.fillRect(i * 10, 10, 10, 10);
}
   ctx.fillRect( 20, 100, 80, 10);
      ctx.fillRect( 90, 20, 10, 80);
      
            ctx.fillRect( 20,110,10,10);
            ctx.fillRect( 30,120,10,10);
            ctx.fillRect( 40,130,10,10);
            ctx.fillRect( 50,140,10,10);
            ctx.fillRect( 60,150,10,10);
            ctx.fillRect( 70,160,10,10);
            ctx.fillRect( 80,170,10,10);
            ctx.fillRect( 90,180,10,10);
            ctx.fillRect( 100,190,10,10);
 </script>
</body>
</html>
