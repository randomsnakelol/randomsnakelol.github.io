<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<title>Canvas</title>
</head>
<body>
  <input type = "text" id="name">
  <button id = "connor7341"> Host </button>
  <button id = "ponnor7341"> Join </button>

<canvas id="canvas" width="10000" height="10000"></canvas>

<script>

 
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");


  var drawCar = function(x, y){
    var canvas = document.getElementById("canvas");
    var ctx = canvas.getContext("2d");
   
    ctx.fillRect(0+x,0+y,50,50);
    
 
  }
  var carX = 0;
  var carY = 0;
  var speedX = 0;
  var speedY = 0;

      
  window.addEventListener('keydown',this.check,false);
// here to     
  var onHostClick = function() {
    var peer = new Peer(document.getElementById("name").value);
peer.on('connection', function(conn) {
  conn.on('data', function(data){
    // Will print 'hi!'
    console.log(data);
  });
})

    console.log(document.getElementById("name").value   ,
"Is Hosting game...");
  };

  var clickerButton = document.getElementById("connor7341");

clickerButton.addEventListener("click", onHostClick);
  
  

  var onJoinClick = function() {
    var peer = new Peer(); 
    var conn = peer.connect(document.getElementById("name").value);
      conn.send("doy");

      });
    console.log(document.getElementById("name").value,"Is Joining game...");
  };

  var clickButton = document.getElementById("ponnor7341");

clickButton.addEventListener("click", onJoinClick);
  // here
  window.setInterval(this.everySecond, 1);

  function check(e) {
    var code = e.keyCode;
    switch (code) {
      case 87:speedY -= 1; break //w
      case 83:speedY += 1; break //s
      case 65:speedX -= 1; break //a
      case 68:speedX += 1; break //d
    }         
    //console.log("speedX is", speedX, "speedY is" , speedY , "carX is ", carX, "carY is ",carY); 

  }
  function everySecond(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);

  
    carY += speedY;
    carX += speedX;

    drawCar(carX, carY); 

  }
</script>
</body>
</html>
